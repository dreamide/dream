name: Package installers

on:
  workflow_dispatch:
    inputs:
      sign:
        description: Sign macOS and Windows artifacts when signing secrets are configured.
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  ENABLE_SIGNING: ${{ github.event_name == 'push' || inputs.sign == true }}
  SSL_COM_ENVIRONMENT_NAME: ${{ secrets.SSL_COM_ENVIRONMENT_NAME || 'PROD' }}

jobs:
  package-linux:
    name: Package Linux
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm vite:build

      - name: Package Linux installer
        run: pnpm exec electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dream-linux
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.blockmap
            release/latest-linux.yml

  package-macos:
    name: Package macOS
    runs-on: blacksmith-6vcpu-macos-15
    timeout-minutes: 60
    env:
      MAC_SIGNING_AVAILABLE: ${{ secrets.MAC_CSC_LINK != '' && secrets.MAC_CSC_KEY_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm vite:build

      - name: Package signed macOS installer
        if: env.ENABLE_SIGNING == 'true' && env.MAC_SIGNING_AVAILABLE == 'true'
        run: pnpm exec electron-builder --mac --universal --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify signed macOS app and notarization
        if: env.ENABLE_SIGNING == 'true' && env.MAC_SIGNING_AVAILABLE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          app_path="$(find release -maxdepth 2 -type d -name 'Dream.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "Could not find Dream.app under release." >&2
            find release -maxdepth 3 -print >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"

          while IFS= read -r dmg_path; do
            xcrun stapler validate "$dmg_path"
          done < <(find release -maxdepth 1 -type f -name '*.dmg' -print)

      - name: Package unsigned macOS installer
        if: env.ENABLE_SIGNING != 'true' || env.MAC_SIGNING_AVAILABLE != 'true'
        run: pnpm exec electron-builder --mac --universal --publish never -c.mac.identity=null
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dream-macos
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  package-windows:
    name: Package Windows
    runs-on: blacksmith-4vcpu-windows-2025
    timeout-minutes: 60
    env:
      WINDOWS_SIGNING_AVAILABLE: ${{ secrets.SSL_COM_USERNAME != '' && secrets.SSL_COM_PASSWORD != '' && secrets.SSL_COM_CREDENTIAL_ID != '' && secrets.SSL_COM_TOTP_SECRET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm vite:build

      - name: Package unpacked Windows app
        if: env.ENABLE_SIGNING == 'true' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        run: pnpm exec electron-builder --win dir --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Sign Windows app executable with SSL.com
        if: env.ENABLE_SIGNING == 'true' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/release/win-unpacked/Dream.exe
          override: true
          malware_block: false
          clean_logs: true
          environment_name: ${{ env.SSL_COM_ENVIRONMENT_NAME }}
          signing_method: v2

      - name: Verify signed Windows app executable
        if: env.ENABLE_SIGNING == 'true' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        shell: pwsh
        run: |
          $appPath = Join-Path $env:GITHUB_WORKSPACE "release\win-unpacked\Dream.exe"
          if (-not (Test-Path -LiteralPath $appPath)) {
            throw "Could not find signed app executable: $appPath"
          }

          $signature = Get-AuthenticodeSignature -LiteralPath $appPath
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "Invalid Windows app executable signature: $($signature.Status)"
          }

      - name: Package signed Windows installer
        if: env.ENABLE_SIGNING == 'true' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        run: pnpm exec electron-builder --win nsis --x64 --prepackaged release/win-unpacked --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Sign Windows installer with SSL.com
        if: env.ENABLE_SIGNING == 'true' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          dir_path: ${{ github.workspace }}/release
          output_path: ${{ github.workspace }}/release
          override: true
          malware_block: false
          clean_logs: true
          environment_name: ${{ env.SSL_COM_ENVIRONMENT_NAME }}
          signing_method: v2

      - name: Verify signed Windows installer
        if: env.ENABLE_SIGNING == 'true' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        shell: pwsh
        run: |
          $releasePath = Join-Path $env:GITHUB_WORKSPACE "release"
          $installers = @(Get-ChildItem -LiteralPath $releasePath -Filter "*.exe" -File)
          if ($installers.Count -eq 0) {
            throw "Could not find signed Windows installer under: $releasePath"
          }

          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName
            $signature | Format-List
            if ($signature.Status -ne "Valid") {
              throw "Invalid Windows installer signature for $($installer.FullName): $($signature.Status)"
            }
          }

      - name: Package unsigned Windows installer
        if: env.ENABLE_SIGNING != 'true' || env.WINDOWS_SIGNING_AVAILABLE != 'true'
        run: pnpm exec electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dream-windows
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
