name: Package installers

on:
  workflow_dispatch:
    inputs:
      sign:
        description: Sign macOS and Windows artifacts when signing secrets are configured.
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  ENABLE_SIGNING: ${{ github.event_name == 'push' || inputs.sign == true }}
  SSL_COM_ENVIRONMENT_NAME: ${{ secrets.SSL_COM_ENVIRONMENT_NAME || 'PROD' }}

jobs:
  package-linux:
    name: Package Linux
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm vite:build

      - name: Package Linux installer
        run: pnpm exec electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dream-linux
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.blockmap
            release/latest-linux.yml

  package-macos:
    name: Package macOS
    runs-on: blacksmith-6vcpu-macos-15
    timeout-minutes: 60
    env:
      MAC_SIGNING_AVAILABLE: ${{ secrets.MAC_CSC_LINK != '' && secrets.MAC_CSC_KEY_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm vite:build

      - name: Validate macOS entitlements
        if: env.ENABLE_SIGNING == 'true' && env.MAC_SIGNING_AVAILABLE == 'true'
        run: plutil -lint build/entitlements.mac.plist

      - name: Package signed macOS installer
        if: env.ENABLE_SIGNING == 'true' && env.MAC_SIGNING_AVAILABLE == 'true'
        run: pnpm exec electron-builder --mac --universal --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify signed macOS app and notarization
        if: env.ENABLE_SIGNING == 'true' && env.MAC_SIGNING_AVAILABLE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          app_path="$(find release -maxdepth 2 -type d -name 'Dream.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "Could not find Dream.app under release." >&2
            find release -maxdepth 3 -print >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"

          while IFS= read -r dmg_path; do
            xcrun stapler validate "$dmg_path"
          done < <(find release -maxdepth 1 -type f -name '*.dmg' -print)

      - name: Package unsigned macOS installer
        if: env.ENABLE_SIGNING != 'true' || env.MAC_SIGNING_AVAILABLE != 'true'
        run: pnpm exec electron-builder --mac --universal --publish never -c.mac.identity=null
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dream-macos
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  package-windows:
    name: Package Windows
    runs-on: blacksmith-4vcpu-windows-2025
    timeout-minutes: 60
    env:
      WINDOWS_SIGNING_AVAILABLE: ${{ secrets.SSL_COM_USERNAME != '' && secrets.SSL_COM_PASSWORD != '' && secrets.SSL_COM_CREDENTIAL_ID != '' && secrets.SSL_COM_TOTP_SECRET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        if: env.ENABLE_SIGNING != 'true' || env.WINDOWS_SIGNING_AVAILABLE != 'true'
        run: pnpm vite:build

      - name: Install SSL.com CodeSignTool
        if: env.ENABLE_SIGNING == 'true' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        shell: pwsh
        run: |
          $toolVersion = "v1.3.2"
          $toolRoot = Join-Path $env:RUNNER_TEMP "CodeSignTool-$toolVersion"
          $downloadPath = Join-Path $env:RUNNER_TEMP "CodeSignTool-$toolVersion-windows.zip"
          $downloadUrl = "https://github.com/SSLcom/CodeSignTool/releases/download/$toolVersion/CodeSignTool-$toolVersion-windows.zip"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $downloadPath

          if (Test-Path -LiteralPath $toolRoot) {
            Remove-Item -LiteralPath $toolRoot -Recurse -Force
          }

          Expand-Archive -LiteralPath $downloadPath -DestinationPath $toolRoot -Force

          $codeSignTool = Join-Path $toolRoot "CodeSignTool.bat"
          if (-not (Test-Path -LiteralPath $codeSignTool)) {
            throw "Could not find CodeSignTool.bat after expanding $downloadPath"
          }

          $configPath = Join-Path $toolRoot "conf\code_sign_tool.properties"
          if ($env:SSL_COM_ENVIRONMENT_NAME -eq "TEST") {
            @(
              "CLIENT_ID=qOUeZCCzSqgA93acB3LYq6lBNjgZdiOxQc-KayC3UMw"
              "OAUTH2_ENDPOINT=https://oauth-sandbox.ssl.com/oauth2/token"
              "CSC_API_ENDPOINT=https://cs-try.ssl.com"
              "TSA_URL=http://ts.ssl.com"
              "TSA_LEGACY_URL=http://ts.ssl.com/legacy"
            ) | Set-Content -LiteralPath $configPath -Encoding ASCII
          } else {
            @(
              "CLIENT_ID=kaXTRACNijSWsFdRKg_KAfD3fqrBlzMbWs6TwWHwAn8"
              "OAUTH2_ENDPOINT=https://login.ssl.com/oauth2/token"
              "CSC_API_ENDPOINT=https://cs.ssl.com"
              "TSA_URL=http://ts.ssl.com"
              "TSA_LEGACY_URL=http://ts.ssl.com/legacy"
            ) | Set-Content -LiteralPath $configPath -Encoding ASCII
          }

          "SSL_COM_CODESIGNTOOL=$codeSignTool" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package signed Windows installer
        if: env.ENABLE_SIGNING == 'true' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        shell: pwsh
        run: pnpm package:win:signed
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}

      - name: Package unsigned Windows installer
        if: env.ENABLE_SIGNING != 'true' || env.WINDOWS_SIGNING_AVAILABLE != 'true'
        run: pnpm exec electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dream-windows
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
