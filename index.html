<!doctype html>
<html class="dark" data-base-color="zinc" lang="en" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dream</title>
    <meta
      name="description"
      content="Multi-project AI IDE built with Electron and AI SDK."
    />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap"
    />
    <style>
      :root {
        --font-inter: "Inter", ui-sans-serif, system-ui, sans-serif;
        --font-jetbrains-mono: "JetBrains Mono", ui-monospace, monospace;
      }

      html,
      body {
        background: oklch(0.141 0.005 285.823);
        color: oklch(0.985 0 0);
        margin: 0;
        min-height: 100%;
      }

      html.light,
      html.light body {
        --background: oklch(1 0 0);
        background: oklch(1 0 0);
        color: oklch(0.145 0 0);
      }

      html.dark,
      html.dark body {
        --background: oklch(0.145 0 0);
        background: oklch(0.145 0 0);
        color: oklch(0.985 0 0);
      }

      html.dark[data-base-color="slate"],
      html.dark[data-base-color="slate"] body {
        --background: oklch(0.129 0.042 264.695);
        background: oklch(0.129 0.042 264.695);
      }

      html.dark[data-base-color="gray"],
      html.dark[data-base-color="gray"] body {
        --background: oklch(0.13 0.028 261.692);
        background: oklch(0.13 0.028 261.692);
      }

      html.dark[data-base-color="zinc"],
      html.dark[data-base-color="zinc"] body {
        --background: oklch(0.141 0.005 285.823);
        background: oklch(0.141 0.005 285.823);
      }

      html.dark[data-base-color="stone"],
      html.dark[data-base-color="stone"] body {
        --background: oklch(0.147 0.004 49.25);
        background: oklch(0.147 0.004 49.25);
      }

      #root {
        min-height: 100vh;
      }

      .boot-loading {
        align-items: center;
        background: var(--background, oklch(0.141 0.005 285.823));
        display: grid;
        inset: 0;
        justify-items: center;
        position: fixed;
        z-index: 50;
      }

      .boot-logo-wrap {
        position: relative;
      }

      .boot-logo {
        display: block;
        height: 4rem;
        position: relative;
        width: 4rem;
        z-index: 10;
      }

      .boot-sparkles-wrap {
        display: block;
        position: relative;
      }

      .boot-sparkles-child {
        align-items: center;
        display: flex;
        height: 16rem;
        justify-content: center;
        position: relative;
        width: 4rem;
        z-index: 10;
      }

      .boot-sparkles-field {
        bottom: 0;
        height: 256px;
        left: 0;
        overflow: visible;
        pointer-events: none;
        position: absolute;
        right: 0;
        z-index: 0;
      }

      .boot-sparkles-field::after {
        animation: boot-sparkles-glow-pulse 2.4s ease-in-out infinite;
        background: radial-gradient(
          60% 100% at 50% 100%,
          rgba(255, 255, 255, 0.45),
          transparent 70%
        );
        bottom: -8px;
        content: "";
        filter: blur(10px);
        height: 50px;
        left: 6%;
        opacity: 0.9;
        position: absolute;
        right: 6%;
      }

      .boot-spark {
        animation-duration: var(--duration, 4s);
        animation-delay: var(--delay, 0s);
        animation-iteration-count: infinite;
        animation-name: boot-sparkles-rise;
        animation-timing-function: linear;
        background: transparent;
        bottom: 0;
        height: var(--size, 2px);
        position: absolute;
        width: var(--size, 2px);
        will-change: transform, opacity;
      }

      .boot-spark.boot-star {
        box-shadow:
          0 calc(var(--size) * -1) 0 var(--c),
          0 var(--size) 0 var(--c),
          calc(var(--size) * -1) 0 0 var(--c),
          var(--size) 0 0 var(--c),
          0 0 0 var(--c),
          calc(var(--size) * -1) calc(var(--size) * -1) 0 color-mix(in oklab, var(--c) 45%, transparent),
          var(--size) calc(var(--size) * -1) 0 color-mix(in oklab, var(--c) 45%, transparent),
          calc(var(--size) * -1) var(--size) 0 color-mix(in oklab, var(--c) 45%, transparent),
          var(--size) var(--size) 0 color-mix(in oklab, var(--c) 45%, transparent);
      }

      .boot-spark.boot-diamond {
        box-shadow:
          0 calc(var(--size) * -2) 0 var(--c),
          0 calc(var(--size) * 2) 0 var(--c),
          calc(var(--size) * -2) 0 0 var(--c),
          calc(var(--size) * 2) 0 0 var(--c),
          0 calc(var(--size) * -1) 0 var(--c),
          0 var(--size) 0 var(--c),
          calc(var(--size) * -1) 0 0 var(--c),
          var(--size) 0 0 var(--c),
          0 0 0 #fff;
      }

      .boot-spark.boot-dot {
        background: var(--c);
        border-radius: 50%;
        box-shadow: 0 0 6px var(--c), 0 0 2px #fff;
      }

      .boot-spark.boot-glow {
        background: var(--c);
        border-radius: 50%;
        box-shadow: 0 0 12px var(--c), 0 0 4px var(--c), 0 0 2px #fff;
        filter: blur(1px);
      }

      .boot-spark.boot-plus {
        box-shadow:
          0 calc(var(--size) * -1) 0 var(--c),
          0 var(--size) 0 var(--c),
          calc(var(--size) * -1) 0 0 var(--c),
          var(--size) 0 0 var(--c),
          0 0 0 var(--c);
      }

      @keyframes boot-sparkles-glow-pulse {
        0%,
        100% {
          opacity: 0.63;
        }
        50% {
          opacity: 0.9;
        }
      }

      @keyframes boot-sparkles-rise {
        0% {
          opacity: 0;
          transform: translate3d(0, 0, 0) scale(0.3);
        }
        10% {
          opacity: 1;
          transform: translate3d(0, calc(var(--rise, 256px) * -0.05), 0)
            scale(1);
        }
        50% {
          opacity: 1;
          transform: translate3d(
              var(--sway),
              calc(var(--rise, 256px) * -0.5),
              0
            )
            scale(1);
        }
        85% {
          opacity: 0.55;
          transform: translate3d(
              calc(var(--sway) * -0.4),
              calc(var(--rise, 256px) * -0.9),
              0
            )
            scale(0.8);
        }
        100% {
          opacity: 0;
          transform: translate3d(
              calc(var(--sway) * -0.8),
              calc(var(--rise, 256px) * -1.05),
              0
            )
            scale(0.2);
        }
      }
    </style>
    <script>
      (() => {
        const THEME_KEY = "dream-theme";
        const UI_KEY = "dream-ui-preferences";
        const root = document.documentElement;

        try {
          const storedTheme = localStorage.getItem(THEME_KEY);
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const resolvedTheme =
            storedTheme === "light"
              ? "light"
              : storedTheme === "system"
                ? prefersDark
                  ? "dark"
                  : "light"
                : "dark";

          root.classList.toggle("dark", resolvedTheme === "dark");
          root.classList.toggle("light", resolvedTheme === "light");
          root.style.colorScheme = resolvedTheme;

          const rawUiPreferences = localStorage.getItem(UI_KEY);
          const parsedUiPreferences = rawUiPreferences
            ? JSON.parse(rawUiPreferences)
            : null;
          const baseColor = parsedUiPreferences?.baseColor ?? "zinc";

          if (baseColor && baseColor !== "neutral") {
            root.setAttribute("data-base-color", baseColor);
          } else {
            root.removeAttribute("data-base-color");
          }
        } catch {
          root.classList.add("dark");
          root.classList.remove("light");
          root.style.colorScheme = "dark";
          root.setAttribute("data-base-color", "zinc");
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root">
      <!-- Static loading screen — replaced when React mounts -->
      <div class="boot-loading" role="status" aria-label="Loading dream">
        <div class="boot-logo-wrap">
          <div class="boot-sparkles-wrap">
            <div class="boot-sparkles-field" aria-hidden="true"></div>
            <div class="boot-sparkles-child">
              <svg class="boot-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" aria-hidden="true">
                <defs><clipPath id="boot-clip"><circle cx="511.5" cy="511.5" r="395"></circle></clipPath></defs>

                </g>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/boot-loading.ts"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
